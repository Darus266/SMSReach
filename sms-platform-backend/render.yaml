services:
  # 1. Base de données PostgreSQL managée par Render
  - type: db
    name: sendreach-db
    databaseName: sendreach_prod
    user: sendreach_admin
    plan: free # Plan gratuit pour le développement/test
    ipAllowList: [] # N'autorise que les connexions internes de Render pour une sécurité maximale

  # 2. Instance Redis managée par Render (requis pour les files d'attente BullMQ)
  - type: redis
    name: sendreach-redis
    plan: free
    ipAllowList: [] # Sécurisé en accès interne uniquement

  # 3. Service Web principal Node.js (API Express + Workers BullMQ intégrés)
  - type: web
    name: sendreach-api
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000 # Port réseau par défaut de Render
      
      # Connexions automatiques injectées par Render
      - key: DATABASE_URL
        fromDatabase:
          name: sendreach-db
          property: connectionString
      - key: REDIS_HOST
        fromService:
          name: sendreach-redis
          type: redis
          property: host
      - key: REDIS_PORT
        fromService:
          name: sendreach-redis
          type: redis
          property: port

      # Génération automatique de clés secrètes aléatoires et sécurisées par Render
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: WEBHOOK_SIGNING_SECRET
        generateValue: true

      # Valeurs applicatives
      - key: DEFAULT_TPS
        value: 10
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
