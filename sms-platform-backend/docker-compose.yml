version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sms-platform-db
    environment:
      POSTGRES_USER: sms_admin
      POSTGRES_PASSWORD: securepassword
      POSTGRES_DB: sms_platform
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: sms-platform-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
